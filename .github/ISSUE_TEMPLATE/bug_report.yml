name: Bug Report
description: Report a bug with expo-quick-look
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call `previewFile({ uri: '...' })`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: expo-sdk
    attributes:
      label: Expo SDK Version
      placeholder: "52"
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: Library Version
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: reproduction-link
    attributes:
      label: Minimal Reproduction
      description: Link to a minimal reproduction (GitHub repo, Snack, etc.)
      placeholder: "https://github.com/..."
    validations:
      required: false
